<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp-in | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="container">
        <section class="form-section">
            <div class="top-logo">
                <img src="images/logo.svg" alt="Camp-in Logo">
            </div>

            <div class="login-card">
                <header class="card-header">
                    <h2>
                        <img src="images/log-in.svg" alt="" class="login-icon">
                        Login
                    </h2>
                    <p class="subtitle">Insert your information below</p>
                </header>

                <form>
                    <div class="field">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <img src="images/mail.svg" alt="" class="inner-icon">
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <img src="images/lock.svg" alt="" class="inner-icon">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••" 
                                required
                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            >
                            <button type="button" class="eye-btn" id="togglePassword">
                                <img src="images/eye.svg" alt="Show/Hide">
                            </button>
                        </div>
                    </div>

                    <div class="row">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            <span class="custom-checkbox"></span>
                            Remind me
                        </label>
                        <a href="#" class="forgot-link">Forgot my password</a>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>

                    <p class="signup-text">
                        Don't have an account? <a href="#">Sign up!</a>
                    </p>
                </form>
            </div>
        </section>

        <section class="image-section"></section>
    </main>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });
    </script>
</body>
</html>
