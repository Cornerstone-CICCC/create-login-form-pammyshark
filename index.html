
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp-in | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <main class="page-container">
        <section class="form-side">
            <header class="form-side__header">
                <img src="images/logo.svg" alt="Camp-in Logo">
            </header>

            <div class="login-wrapper">
                <div class="login-header">
                    <h1>
                        <img src="images/log-in.svg" alt="" aria-hidden="true">
                        Login
                    </h1>
                    <p>Insert your information below.</p>
                </div>

                <form class="login-form">
                    <div class="input-block">
                        <label for="email">E-mail</label>
                        <div class="input-field">
                            <img src="images/mail.svg" alt="" class="field-icon">
                            <input type="email" id="email" placeholder="Type your email" required>
                        </div>
                    </div>

                    <div class="input-block">
                        <label for="password">Password</label>
                        <div class="input-field">
                            <img src="images/lock.svg" alt="" class="field-icon">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Type your password" 
                                required 
                                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                title="Must contain at least 8 characters, including one uppercase letter and one number."
                            >
                            <button type="button" class="eye-btn">
                                <img src="images/eye.svg" alt="Toggle visibility">
                            </button>
                        </div>
                    </div>

                    <div class="form-utils">
                        <label class="check-container">
                            <input type="checkbox">
                            <span class="square"></span>
                            Remind me
                        </label>
                        <a href="#" class="link-forgot">Forgot my password</a>
                    </div>

                    <button type="submit" class="submit-btn">LOGIN</button>
                </form>

                <footer class="signup-footer">
                    Don't have an account? <a href="#">Sign up!</a>
                </footer>
            </div>
        </section>

        <section class="image-side">
            </section>
    </main>
  </body>
</html>
